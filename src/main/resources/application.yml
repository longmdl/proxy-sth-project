server:
  port: 8080
  shutdown: graceful

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:proxydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

nfc:
  max-attempts: 3
  request:
    ttl-minutes: 15
  helper:
    ttl-minutes: 15
  longpoll:
    timeout-seconds: 30
  device:
    default-nfc-supported: true

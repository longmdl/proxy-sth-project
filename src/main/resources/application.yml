server:
  port: 8080
  shutdown: graceful

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:proxydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

nfc:
  max-attempts: 3
  ott.max-resend: 3
  ott.cooldown-seconds: 60
  request:
    ttl-minutes: 15
  helper:
    ttl-minutes: 15
  longpoll:
    timeout-seconds: 30
  device:
    default-nfc-supported: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000